<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Página de Funcionários</title>
{% load static %}

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
<link rel="stylesheet" href="{% static 'trendfeeds/css/index_funcionarios.css' %}" />
      <style>
            /* Estilização para o menu lateral */
            .sidebar {
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #343a40;
            padding-top: 30px;
            width: 250px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            }
            .sidebar a {
            color: #ffffff;
            text-decoration: none;
            padding: 15px 20px;
            display: block;
            font-size: 16px;
            border-radius: 4px;
            margin: 10px 20px;
            transition: background-color 0.3s, transform 0.2s;
            }
            .sidebar a:hover {
            background-color: #495057;
            transform: translateX(5px);
            }
            .main-content {
            margin-left: 270px; /* Largura do menu lateral */
            padding: 20px;
            }
            .sidebar h3 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            }

            body{
                  transition: 0.4s;
            }
            
            body.dark-mode{
            background-color: #1a1a1a;
            }

            body.dark-mode .main-content{
                  background-color: #1a1a1a;
                  transition: 0.4s !important;
            }

            body.dark-mode .card{
                  background-color: #1a1a1a;
                  box-shadow: 0 4px 8px rgb(0 0 0 / 49%);
            }


            body.dark-mode .gerenciar{
                  color: #bbbbbb;
            }
            body.dark-mode .card-title{
                  color: #bbbbbb;
            }

            body.dark-mode p{
                  color: #bbbbbb;
            }
      </style>
</head>
<body>

    <!-- Menu Lateral -->
      <div class="sidebar">
            <h3>Menu</h3>        
            <a href="{% url 'pagina_funcionarios' %}">início funcionários</a>
            <a href="{% url 'home' %}">Início do site</a>                 
            <a href="{% url 'criar_noticia' %}">Criar Nova Notícia</a>
            <a href='#' id="dark-mode-toggle">Claro</a>

      </div>

    <!-- Conteúdo Principal -->
      <main class="main-content">
            <div class="container mt-5">
            <h2 class='gerenciar' style='color: #333;'>Gerenciar Notícias </h2>
            <div class="row">
                  {% for noticia in noticias %}
                        <div class="col-12 col-md-4 mb-4">
                        <div class="card">
                              <img src="{% get_media_prefix %}noticias/n_{{ noticia.id }}_0.jpg" class="card-img-top" alt="Imagem da Notícia" onerror="this.onerror=null; this.src='{% get_media_prefix %}SemImagem.png';">
                              <div class="card-body">
                                    <h5 class="card-title">{{ noticia.titulo }}</h5>
                                    <p class="card-text">{{ noticia.descricao|slice:":100" }}...</p>
                                    <a href="{% url 'detalhes_noticia' noticia.slug %}" class="btn btn-warning">Editar</a>
                                    <form action="{% url 'deletar_noticia' noticia.id %}" method="POST" class="d-inline">
                                          {% csrf_token %}
                                          <button type="submit" class="btn btn-danger btn-sm mt-2"style="padding: 2.3%;">Deletar</button>
                                    </form>
                              </div>
                        </div>
                        </div>
                  {% endfor %}
            </div>

            <form method="post" action="{% url 'coletar_noticias' %}">
                  {% csrf_token %}
                  <button type="submit" class="btn btn-primary mt-3">Coletar Notícias</button>
            </form> 
      </main>



    <!-- Script necessário para o modo noturno -->
      <script>
            // Espera a página carregar completamente
            window.onload = function() {
            const toggleButton = document.getElementById('dark-mode-toggle');

            // Verificar se o modo escuro está ativado previamente
            if (localStorage.getItem('dark-mode') === 'true') {
            document.body.classList.add('dark-mode');
            toggleButton.innerHTML = "Escuro"; // Alterando o texto do botão
            }

            // Evento de clique para alternar entre modos (escuro/claro)
            toggleButton.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode'); // Alterna a classe dark-mode no body
            const isDarkMode = document.body.classList.contains('dark-mode');
            
            // Atualiza o estado do botão e do logo, e salva a preferência no localStorage
            if (isDarkMode) {
                  toggleButton.innerHTML = "Escuro";
                  localStorage.setItem('dark-mode', 'true'); // Salva a preferência
            } else {
                  toggleButton.innerHTML = "Claro";
                  localStorage.setItem('dark-mode', 'false'); // Salva a preferência
            }
            });
            }
      </script>

    
</body>
</html>
