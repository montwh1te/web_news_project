<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'trendfeeds/css/index_trendfeeds.css' %}">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light navbar-custom d-flex justify-content-sm-around">
            <!-- Esquerda: Nome do site e dropdown dos times -->
            <div class="d-flex align-items-center">
                <a class="navbar-brand p-2 nome-site" href="#">site noticias</a>
            </div>

            <!-- Centro: Itens do menu -->
            <div class="d-flex justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <div class="nav-link dropdown-toggle d-flex align-items-center" id="dropdownTimes" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            <img src="{% get_media_prefix %}brasao.png" alt="Ícone do Time" style="width: 30px; height: 30px;">
                        </div>
                        
                        <div class="dropdown-menu p-3" aria-labelledby="dropdownTimes">
                            <div class="d-flex flex-wrap">
                                <!-- Imagens dos times -->
                                <a class="dropdown-item p-2" href="#"><img src="{% get_media_prefix %}time1.png" alt="Time 1" style="width: 50px; height: 50px;"></a>
                                <a class="dropdown-item p-2" href="#"><img src="{% get_media_prefix %}time2.png" alt="Time 2" style="width: 50px; height: 50px;"></a>
                                <a class="dropdown-item p-2" href="#"><img src="{% get_media_prefix %}time3.png" alt="Time 3" style="width: 50px; height: 50px;"></a>
                            </div>
                        </div>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Serviços</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
                </ul>
            </div>

            <!-- Direita: Barra de pesquisa -->
            <div class="d-flex align-items-center">
                <form class="form-inline">
                    <input class="form-control mr-sm-2" type="search" placeholder="Pesquisar" aria-label="Pesquisar">
                    <button class="btn my-2 my-sm-0" type="submit">
                        <img src="{% get_media_prefix %}pngwing.com (3).png" alt="lupa" style="width: 30px; height: 30px;">
                    </button>
                </form>
            </div>

            <!-- mais direita: icone login -->
            <div class="d-flex align-items-center">
                <button class="btn my-2 my-sm-0" type="submit"> 
                    <a href="{% url 'registro' %}"><img src="{% get_media_prefix %}login.png" alt="login" style="width: 30px; height: 30px;"></a>
                </button>
            </div>
        </nav>
    </header>

    {% load custom_filters %}

    <main class="d-flex container-fluid justify-content-center">
        <div class="row d-flex flex-nowrap justify-content-center noticias-recentes-banner-principal">
            
            <!-- Notícia principal -->
            <div class="col-6 col-md-3 noticia-mais-recente">
                <a href="{% if ultima_noticia.slug %}{% url 'detalhes_noticia' ultima_noticia.slug %}{% else %}# {% endif %}">
                    <img class="img-fluid imagem-principal-banner"  
                        src="{% if ultima_noticia.imagens.all %}{{ ultima_noticia.imagens.all.0.imagem.url }}{% else %}{% get_media_prefix %}default_image.jpg{% endif %}" 
                        alt="noticia-mais-recente" style="border-radius: 20px;">
                </a>
                <div class="d-flex flex-column container-fluid justify-content-start descricao-noticia-mais-recente">
                    <a href="{% if ultima_noticia.slug %}{% url 'detalhes_noticia' ultima_noticia.slug %}{% else %}# {% endif %}">
                        <p class="titulo-noticia-mais-recente">{{ ultima_noticia.titulo|replace_underscore }}</p>
                    </a>
                    <p class="resumo-noticia-mais-recente">{{ ultima_noticia.descricao|slice:":150" }}...</p>
                </div>
            </div>
    
            <!-- Outras notícias -->
            <div class="d-flex flex-wrap container-fluid justify-content-center noticias-recentes-div">
                {% for noticia in outras_noticias %}
                <div class="col-6 col-md-3 noticia-recente">
                    <a href="{% url 'detalhes_noticia' noticia.slug %}">
                        <img class="img-fluid imagem-principal-banner" 
                             src="{% if noticia.imagens.all %}{{ noticia.imagens.all.0.imagem.url }}{% else %}{% get_media_prefix %}default_image.jpg{% endif %}" 
                             alt="noticia-recente" style="border-radius: 20px;">
                    </a>
                    <div class="d-flex flex-wrap-column container-fluid justify-content-start descricao-noticia-mais-recente">
                        <p class="titulo-noticia-recente">{{ noticia.titulo|replace_underscore }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>
    </main>

    <!-- JavaScript do Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
