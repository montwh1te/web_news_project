<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Meu Site de Notícias{% endblock title %}</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }
      .site-header,
      .site-footer {
        background-color: #333;
        color: #fff;
        padding: 20px 0;
        text-align: center;
      }
      .site-header h1,
      .site-footer p {
        margin: 0;
      }
      .main-nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        justify-content: center;
        gap: 15px;
      }
      .main-nav ul li {
        display: inline;
      }
      .main-nav ul li a {
        color: #fff;
        text-decoration: none;
      }
      .container {
        width: 90%;
        max-width: 1200px;
        margin: auto;
      }
      .site-content {
        padding: 20px;
      }

      .noticias-listagem {
        padding: 20px;
      }
      .noticias-container {
        margin-top: 20px;
      }
      .noticia-item {
        margin-bottom: 20px;
      }
      .noticia-item a {
        color: #333;
        text-decoration: none;
      }
      .noticia-item h3 {
        margin: 0;
      }
      .noticia-item p {
        margin: 5px 0;
      }

      :root {
        --cor-categoria: {
           {
            cor_categoria|default: "#cccccc";
          }
        }
      }

      .categoria-header {
        background-color: var(--cor-categoria,#cccccc ); /* Fallback para cinza claro */
        padding: 20px;
        color: white;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- Cabeçalho do Site -->
    <header class="site-header">
      <div class="container">
        <h1><a href="{% url 'home' %}">Meu Site de Notícias</a></h1>
        <nav class="main-nav">
          <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Categorias</a></li>
            <li><a href="#">Sobre</a></li>
            <li><a href="#">Contato</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="site-content">
      <div class="container">
        {% block content %}
        <!-- O conteúdo das páginas será inserido aqui -->
        {% endblock content %}
      </div>
    </main>

    <!-- Rodapé do Site -->
    <footer class="site-footer">
      <div class="container">
        <p>
          &copy; {{ year }} Meu Site de Notícias. Todos os direitos reservados.
        </p>
      </div>
    </footer>
  </body>
</html>
