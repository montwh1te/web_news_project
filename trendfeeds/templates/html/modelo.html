<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock title %}</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/trendfeeds/css/modelo.css">
    {% load static %}
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light navbar-custom shadow-sm">
            <a class="navbar-brand p-2 nome-site" href="#">site noticias</a>
            <div class="d-flex justify-content-center" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="#">Início</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Sobre</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Serviços</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contato</a></li>
                </ul>
            </div>
            <div class="d-flex align-items-center">
                <form class="form-inline">
                    <input class="form-control mr-sm-2" type="search" placeholder="Pesquisar" aria-label="Pesquisar">
                    <button class="btn" type="submit"><img src="pngwing.com (3).png" alt="lupa" style="width: 30px; height: 30px;"></button>
                </form>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero bg-primary text-white text-center py-5">
        <h1 class="display-4">{% block main_title %}{% endblock main_title %}</h1>
    </section>

    <main class="container mt-4">
        <article class="noticia-detalhada">
            <div class="row">
                <div class="col-lg-8">
                    <h2 class="noticia-titulo">{% block second_title %}{% endblock second_title %}</h2>
                    <div class="noticia-conteudo">
                        {% block main_content %}{% endblock main_content %}
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card border-light shadow-sm mb-4">
                        <!-- colocar aqui uma imagem aleatoria do banco de dados da própria noticia, ou a imagem de outra noticia com o link pra ela, e deixar fixed, enfim, decidir. A principio fica tudo pro banco de dados, entao  --> <img src="#" class="card-img-top noticia-imagem" alt="Imagem da notícia">
                        <div class="card-body">
                            <h5 class="card-title">###</h5><!-- bd -->
                            <p class="card-text">###</p><!-- bd -->
                        </div>
                    </div>
                </div>
            </div>
        </article>
    </main>

    <footer class="text-center py-3 bg-light">
        <p class="mb-0">© 2024 site noticias - Todos os direitos reservados.</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

</body>
</html>
