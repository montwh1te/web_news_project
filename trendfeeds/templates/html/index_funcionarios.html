<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Página de Funcionários</title>
    {% load static %}

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="stylesheet" href="{% static 'trendfeeds/css/index_funcionarios.css' %}" />
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-custom d-flex justify-content-sm-around">
            <!-- Seu código de navegação -->
        </nav>
    </header>

    <main class="container mt-5">
        <h2>Gerenciar Notícias</h2>
        <div class="row">
            {% for noticia in noticias %}
                <div class="col-12 col-md-4 mb-4">
                    <div class="card">
                        <img src="{% get_media_prefix %}noticias/n_{{ noticia.id }}_0.jpg" class="card-img-top" alt="Imagem da Notícia">
                        <div class="card-body">
                            <h5 class="card-title">{{ noticia.titulo }}</h5>
                            <p class="card-text">{{ noticia.descricao|slice:":100" }}...</p>
                            <a href="{% url 'detalhes_noticia' noticia.slug %}" class="btn btn-warning">Editar</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
        
        <!-- Botão para acionar a função de coletar notícias -->
        <form method="post" action="{% url 'coletar_noticias' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary mt-3">Coletar Notícias</button>
        </form>

        
        <a class="btn btn-primary mt-3" href="{% url 'criar_noticia' %}" >Criar nova notícia</a>
       
    </main>



</body>
</html>
