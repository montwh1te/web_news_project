{% load custom_filters_users %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel Infinito</title>
    {% load static %}

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do Owl Carousel -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

    <style>
        .carousel-wrap {
            margin: 22px auto;
            width: 100%;
            position: relative;
            width: calc(100% - 50px); /* Ajuste a largura do container */
            overflow: hidden;
        }

        .nome_time{
            display: none;
        }
        .descricao_time{
            display: none;
        }
        .nome_time.active {
            display: block;
            position: relative;
            top: 180px;
            width: 1000px;
            text-align: center;
            font-size: 60px;
            font-family: emoji;
            text-transform: uppercase;
        }
        .descricao_time.active {
            display: block;
            position: relative;
            top: 220px;
            text-align: center;
            width: 1000px;
            font-size: 20px;
        }
        .owl-carousel .item {
            margin: 0 15px;
            height: 800px;
            display: flex;
            justify-content: center;
            opacity: 1;
            flex-direction: column;
            align-items: center;
        }

        .owl-carousel .item img {
            max-width: 150px;
            height: auto;
            margin: 40px auto;
            display: block;
        }

        .owl-carousel .center-active img {
            transform: scale(1.9); /* Amplia a imagem do item ativo */
            transition: transform 0.3s ease;
        }
    
        .owl-carousel .owl-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
    
        .owl-carousel .owl-nav i {
            font-size: 30px;
            cursor: pointer;
            color: #333;
        }

        /* Times Série A */
        .atlético-mg { background-color: #000000; }
        .athletico-pr { background-color: #D81E05; }
        .bahia { background-color: #003E92; }
        .botafogo { background-color: #000000; }
        .bragantino { background-color: #E30613; }
        .corinthians { background-color: #000000; }
        .cruzeiro { background-color: #003DA5; }
        .cuiabá { background-color: #00843D; }
        .flamengo { background-color: #E30613; }
        .fluminense { background-color: #880016; }
        .fortaleza { background-color: #0033A0; }
        .grêmio { background-color: #6CABDD; }
        .internacional { background-color: #E30613; }
        .palmeiras { background-color: #009739; }
        .são-paulo { background-color: #E30613; }
        .vasco { background-color: #000000; }
        .juventude { background-color: #00843D; }
        .criciúma { background-color: #FFD700; }
        .vitória { background-color: #E30613; }
        .atlético-go { background-color: #D81E05; }

        /* Seleção Brasileira */
        .seleção { background-color: #FFCC00; }

        /* Times Série B */
        .ceará { background-color: #000000; }
        .crb { background-color: #E30613; }
        .amazonas { background-color: #FFD700; }
        .operário-pr { background-color: #000000; }
        .brusque { background-color: #FFCC00; }
        .paysandu { background-color: #009FDA; }
        .chapecoense { background-color: #00843D; }
        .ituano { background-color: #D81E05; }
        .mirassol { background-color: #FFD700; }
        .novorizontino { background-color: #FFD700; }
        .ponte-preta { background-color: #000000; }
        .sport { background-color: #E30613; }
        .vila-nova { background-color: #D81E05; }
        .avaí { background-color: #003DA5; }
        .botafogo-sp { background-color: #000000; }
        .guarani { background-color: #00843D; }
        .goiás { background-color: #00843D; }
        .santos { background-color: #000000; }
        .coritiba { background-color: #00843D; }
        .américa-mg { background-color: #00843D; }
    </style>
</head>

<body>
    <div class="carousel-wrap">
        <div class="owl-carousel">
            {% for categoria in categorias %}
                {% if categoria.serie == 'A' %}
                    <div class="item">
                        <input type="radio" class="teste" id="{{ categoria.nome|lower }}" name="background" value="{{ categoria.nome|lower }}">
                        <label style="cursor: pointer;" for="{{ categoria.nome|lower }}"><img src="{% get_media_prefix %}escudos/{{ categoria.nome_categoria|lower }}.png" alt="imagem-time"></label>
                        <h2 class="nome_time">{{ categoria.nome }}</h2>
                        <p class="descricao_time">{{ categoria.descricao }}</p>
                    </div>
                {% endif %}
            {% endfor %}
        </div>
    </div>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Owl Carousel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

    <script>
        $(document).ready(function () {
            const $carousel = $('.owl-carousel');

            $('.owl-carousel').owlCarousel({
            loop: true,
            margin: 10,
            nav: true,
            center: true,
            dots: false,
            drag: false,
            touchDrag: false,
            mouseDrag: false,
            pullDrag: false,
            responsive: {
                0: {
                    items: 1
                },
                600: {
                    items: 3
                },
                1000: {
                    items: 5
                }
            }
        });

        // Força o destaque do item inicial no carregamento
        function highlightInitialItem() {
            const $initialCenterItem = $('.owl-item.active.center');

            $initialCenterItem.addClass('center-active');
            $initialCenterItem.find('.nome_time').addClass('active');
            $initialCenterItem.find('.descricao_time').addClass('active');

            const nomeTime = $initialCenterItem.find('.nome_time').text(); // Conteúdo do h2.

            // Encontra o input correspondente ao time central com o valor do h2
            const $inputCorrespondente = $initialCenterItem.find('input[value="' + nomeTime.toLowerCase() + '"]');

            // Adiciona a classe 'active' ao input ativo
            $inputCorrespondente.addClass('active');
        }

        // Garante que o evento de inicialização aplique os estados corretamente
        $carousel.on('initialized.owl.carousel', function () {
            setTimeout(highlightInitialItem, 50); // Garante o carregamento do DOM
        });

        // Detectar quando a transição termina
        $carousel.on('translated.owl.carousel', function () {
            
            $('.owl-item').removeClass('center-active');
            $('.owl-item.center').addClass('center-active');
            $('.nome_time, .descricao_time').removeClass('active');

            // Identifica o item central atual
            const $currentCenterItem = $('.owl-item.center');
            const nomeTime = $currentCenterItem.find('.nome_time').text(); // Conteúdo do h2.

            // Encontra o input correspondente ao time central com o valor do h2
            const $inputCorrespondente = $currentCenterItem.find('input[value="' + nomeTime.toLowerCase() + '"]');

            // Remover a classe active de todos os inputs
            $('input[name="background"]').removeClass('active');
            
            // Adiciona a classe 'active' ao input ativo
            $inputCorrespondente.addClass('active');

            var valor_input = $inputCorrespondente.val();

            // Remover qualquer classe anterior no <body> e adicionar a nova
            $('body').removeClass(function (index, className) {
                return (className.match(/\b\w+\b/g) || []).join(' ');
            });
            $('body').addClass(valor_input);

            // Adiciona a classe 'active' somente ao nome e descrição do item central
            $currentCenterItem.find('.nome_time').addClass('active');
            $currentCenterItem.find('.descricao_time').addClass('active');
        });

        setTimeout(highlightInitialItem, 200); // Garante o carregamento do DOM

});

    </script>
</body>
</html>
