{% load custom_filters_users %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel Infinito</title>
    {% load static %}

    <!-- Bootstrap -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do Owl Carousel -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

    <style>
        .carousel-wrap {
            margin: 22px auto;
            width: 100%;
            position: relative;
            width: calc(100% - 50px); /* Ajuste a largura do container */
            overflow: hidden;
        }

        .nome_time{
            display: none;
        }
        .descricao_time{
            display: none;
        }
        .nome_time.active {
            display: block;
            position: relative;
            top: 180px;
            width: 1000px;
            text-align: center;
            font-size: 60px;
            font-family: emoji;
            text-transform: uppercase;
        }
        .descricao_time.active {
            display: block;
            position: relative;
            top: 220px;
            text-align: center;
            width: 1000px;
            font-size: 20px;
        }
        .owl-carousel .item {
            margin: 0 15px;
            height: 800px;
            display: flex;
            justify-content: center;
            opacity: 1;
            flex-direction: column;
            align-items: center;
        }

        .owl-carousel .item img {
            max-width: 150px;
            height: auto;
            margin: 40px auto;
            display: block;
        }

        .owl-carousel .center-active img {
            transform: scale(1.9); /* Amplia a imagem do item ativo */
            transition: transform 0.5s ease;
        }

        .owl-carousel .item input {
            display: none;
        }
    
        .owl-carousel .owl-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
    
        .owl-carousel .owl-nav i {
            font-size: 30px;
            cursor: pointer;
            color: #333;
        }

        /* ATLÉTICO MG */
        .atlético-mg {
            position: relative;
            color: white;
            overflow: hidden;
        }

        .atlético-mg::before {
            content: '';
            position: absolute;
            height: 130%;
            width: 107%;
            top: -30px;
            left: -3px;
            background-image: url(https://atletico.com.br/wp-content/uploads/2024/07/53852316265_0c9db1ccdd_k.jpg);
            filter: blur(5px);
            z-index: -1;
        }

        .atlético-mg_nome {
            color: white;
            display: inline-block; 
        }

        .atlético-mg_descricao {
            color: white;
            display: inline-block; 
        }

        /* ATHLÉTICO PR */
        .athletico-pr {
            position: relative;
            color: white;
            overflow: hidden;
        }

        .athletico-pr::before {
            content: '';
            position: absolute;
            height: 130%;
            width: 107%;
            top: -30px;
            left: -3px;
            background-image: url(https://www.cnnbrasil.com.br/wp-content/uploads/sites/12/2023/01/FnCTl-2WQAEPV5x.jpg);
            filter: blur(5px);
            z-index: -1;
        }

        .athletico-pr_nome {
            color: white;
            display: inline-block; 
        }

        .athletico-pr_descricao {
            color: white;
            display: inline-block; 
        }

        .bahia { background-color: #003E92; color: white;}

        .botafogo { background-color: #000000; color: white;}

        .bragantino { background-color: #E30613; color: white;}

        .corinthians { background-color: #000000; color: white;}

        .cruzeiro { background-color: #003DA5; color: white;}
        .cuiabá { background-color: #00843D; color: white;}
        .flamengo { background-color: #E30613; color: white;}
        .fluminense { background-color: #880016; color: white;}
        .fortaleza { background-color: #0033A0; color: white;}
        .grêmio { background-color: #6CABDD; color: white;}
        .internacional { background-color: #E30613; color: white;}
        .palmeiras { background-color: #009739; color: white;}
        .são-paulo { background-color: #E30613; color: white;}
        .vasco { background-color: #000000; color: white;}
        .juventude { background-color: #00843D; color: white;}
        .criciúma { background-color: #FFD700; color: white;}
        .vitória { background-color: #E30613; color: white;}
        .atlético-go { background-color: #D81E05; color: white;}

        /* Seleção Brasileira */
        .seleção { background-color: #FFCC00; color: white;}

        /* Times Série B */
        .ceará { background-color: #000000; color: white;}
        .crb { background-color: #E30613; color: white;}
        .amazonas { background-color: #FFD700; color: white;}
        .operário-pr { background-color: #000000; color: white;}
        .brusque { background-color: #FFCC00; color: white;}
        .paysandu { background-color: #009FDA; color: white;}
        .chapecoense { background-color: #00843D; color: white;}
        .ituano { background-color: #D81E05; color: white;}
        .mirassol { background-color: #FFD700; color: white;}
        .novorizontino { background-color: #FFD700; color: white;}
        .ponte-preta { background-color: #000000; color: white;}
        .sport { background-color: #E30613; color: white;}
        .vila-nova { background-color: #D81E05; color: white;}
        .avaí { background-color: #003DA5; color: white;}
        .botafogo-sp { background-color: #000000; color: white;}
        .guarani { background-color: #00843D; color: white;}
        .goiás { background-color: #00843D; color: white;}
        .santos { background-color: #000000; color: white;}
        .coritiba { background-color: #00843D; color: white;}
        .américa-mg { background-color: #00843D; color: white;}
    </style>
</head>

<body>
    <div class="carousel-wrap">
        <div class="owl-carousel">
            {% for categoria in categorias %}
                {% if categoria.serie == 'A' %}
                    <div class="item">
                        <input type="radio" class="teste" id="{{ categoria.nome|lower }}" name="background" value="{{ categoria.nome|lower }}">
                        <label style="cursor: pointer;" for="{{ categoria.nome|lower }}"><img src="{% get_media_prefix %}escudos/{{ categoria.nome_categoria|lower }}.png" alt="imagem-time"></label>
                        <h2 class="nome_time">{{ categoria.nome }}</h2>
                        <p class="descricao_time">{{ categoria.descricao }}</p>
                    </div>
                {% endif %}
            {% endfor %}
        </div>
    </div>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <!-- Owl Carousel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

    <script>
        $(document).ready(function () {
            const $carousel = $('.owl-carousel');

            $('.owl-carousel').owlCarousel({
            loop: true,
            margin: 10,
            nav: true,
            center: true,
            dots: false,
            drag: false,
            touchDrag: false,
            mouseDrag: false,
            pullDrag: false,
            responsive: {
                0: {
                    items: 1
                },
                600: {
                    items: 3
                },
                1000: {
                    items: 5
                }
            }
        });

        // Força o destaque do item inicial no carregamento
        function highlightInitialItem() {
            const $initialCenterItem = $('.owl-item.active.center');

            $initialCenterItem.addClass('center-active');
            $initialCenterItem.find('.nome_time').removeClass().addClass('nome_time active atlético-mg_nome');
            $initialCenterItem.find('.descricao_time').removeClass().addClass('descricao_time active atlético-mg_descricao');


            const nomeTime = $initialCenterItem.find('.nome_time').text(); // Conteúdo do h2.

            // Encontra o input correspondente ao time central com o valor do h2
            const $inputCorrespondente = $initialCenterItem.find('input[value="' + nomeTime.toLowerCase() + '"]');

            // Adiciona a classe 'active' ao input ativo
            $inputCorrespondente.addClass('active');
        }

        // Garante que o evento de inicialização aplique os estados corretamente
        $carousel.on('initialized.owl.carousel', function () {
            setTimeout(highlightInitialItem, 50); // Garante o carregamento do DOM
        });

        // Valor inicial para Atlético-MG
        var valor_inicial = "atlético-mg";

        // Substitui espaços por hífens no valor inicial para corresponder ao CSS
        var valor_inicial_css = valor_inicial.replace(/\s+/g, '-');

        // Remove todas as classes relacionadas aos times do <body> (caso necessário)
        $('body').removeClass(function (index, className) {
            return (className.match(/\batlético-mg|athletico-pr|bahia|botafogo|bragantino|corinthians|cruzeiro|cuiabá|flamengo|fluminense|fortaleza|grêmio|internacional|palmeiras|são-paulo|vasco|juventude|criciúma|vitória|atlético-go|seleção|ceará|crb|amazonas|operário-pr|brusque|paysandu|chapecoense|ituano|mirassol|novorizontino|ponte-preta|sport|vila-nova|avaí|botafogo-sp|guarani|goiás|santos|coritiba|américa-mg\b/g) || []).join(' ');
        });

        // Adiciona a classe inicial ao <body>
        $('body').addClass(valor_inicial_css);

        // Declarando variável de escopo para armazenar nome do time antigo que foi executado na função abaixo
        let time_antigo = valor_inicial_css

        // Detectar quando a transição termina
        $carousel.on('translated.owl.carousel', function () {
            
            $('.owl-item').removeClass('center-active');
            $('.owl-item.center').addClass('center-active');
            $('.nome_time, .descricao_time').removeClass('active');
            $('.nome_time').removeClass(`${time_antigo}_nome`);
            $('.descricao_time').removeClass(`${time_antigo}_descricao`);

            // Identifica o item central atual
            const $currentCenterItem = $('.owl-item.center');
            const nomeTime = $currentCenterItem.find('.nome_time').text(); // Conteúdo do h2.

            // Encontra o input correspondente ao time central com o valor do h2
            const $inputCorrespondente = $currentCenterItem.find('input[value="' + nomeTime.toLowerCase() + '"]');

            // Remover a classe active de todos os inputs
            $('input[name="background"]').removeClass('active');
            
            // Adiciona a classe 'active' ao input ativo
            $inputCorrespondente.addClass('active');

            var valor_input = $inputCorrespondente.val();

            // Substitui espaços por hífens no valor do input para corresponder ao CSS
            var valor_input_css = valor_input.replace(/\s+/g, '-');


            // Remover qualquer classe anterior no <body> e adicionar a nova
            $('body').removeClass(function (index, className) {

                return (className.match(/\batlético-mg|athletico-pr|bahia|botafogo|bragantino|corinthians|cruzeiro|cuiabá|flamengo|fluminense|fortaleza|grêmio|internacional|palmeiras|são-paulo|vasco|juventude|criciúma|vitória|atlético-go|seleção|ceará|crb|amazonas|operário-pr|brusque|paysandu|chapecoense|ituano|mirassol|novorizontino|ponte-preta|sport|vila-nova|avaí|botafogo-sp|guarani|goiás|santos|coritiba|américa-mg\b/g) || []).join(' ');
            
            });

            $('body').addClass(valor_input_css);

            // Adiciona a classe 'active' e o nome do time somente ao nome e descrição do item central
            $currentCenterItem.find('.nome_time').removeClass().addClass(`nome_time active ${valor_input_css}_nome`);
            $currentCenterItem.find('.descricao_time').removeClass().addClass(`descricao_time active ${valor_input_css}_descricao`);


            // Atualiza o time antigo para o próximo evento
            time_antigo = valor_input_css;

            // Log para depuração
            console.log(`Time antigo: ${time_antigo}`);
        });

        setTimeout(highlightInitialItem, 200); // Garante o carregamento do DOM

});
    </script>
</body>
</html>
