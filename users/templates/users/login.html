<!DOCTYPE html>
<html lang="pt-br">
<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Login</title>
      <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
      <style>
            body {
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  min-height: 100vh;
                  background-color: #f8f9fa;
                  font-family: Arial, sans-serif;
            }

            .form-container {
                  width: 100%;
                  max-width: 400px;
                  background: #ffffff;
                  padding: 30px;
                  border-radius: 8px;
                  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            }

            h2 {
                  text-align: center;
                  color: #343a40;
                  margin-bottom: 20px;
            }

            .btn-primary {
                  width: 100%;
                  padding: 10px;
                  font-size: 16px;
                  font-weight: bold;
            }

            .register-link {
                  display: block;
                  text-align: center;
                  margin-top: 15px;
                  font-size: 14px;
            }

            .register-link a {
                  color: #007bff;
                  text-decoration: none;
            }

            .register-link a:hover {
                  text-decoration: underline;
            }
      </style>
</head>
<body>
      <div class="form-container">
            <h2>Login</h2>
            <form method="post">
                  {% csrf_token %}
                  {% for field in form %}
                        <div class="form-group">
                              {{ field.label_tag }}
                              {{ field }}
                              {% for error in field.errors %}
                                  <div class="text-danger">{{ error }}</div>
                              {% endfor %}
                        </div>
                  {% endfor %}

                  {% if form.non_field_errors %}
                        <div class="form-group text-danger">
                              {% for error in form.non_field_errors %}
                                  <p>{{ error }}</p>
                              {% endfor %}
                        </div>
                  {% endif %}
                  
                  <button type="submit" class="btn btn-primary mt-3">Entrar</button>
            </form>
            <p class="register-link">Não tem uma conta? <a href="{% url 'registro' %}">Se registre!</a></p>
      </div>

      <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.6.0/dist/umd/popper.min.js"></script>
      <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

      <script>
            document.addEventListener("DOMContentLoaded", function() {
                // Seleciona o elemento que contém a mensagem de erro
                const erroMensagem = document.querySelector(".text-danger");
        
                // Verifica se a mensagem de erro existe e, se sim, personaliza o conteúdo
                if (erroMensagem) {
                    erroMensagem.textContent = "O nome de usuário ou senha estão incorretos. Verifique suas credenciais e tente novamente.";
                }
            });
        </script>
</body>
</html>
